<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de datos D&D de Nico</title>
    <style>
        :root {
            --bg-color: #1a1a1d;
            --card-bg: #2d2d30;
            --text-color: #e0e0e0;
            --accent: #c3073f;
            --secondary: #6f2232;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        h1, h2 { color: var(--accent); text-align: center; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Controles */
        .controls { background: var(--card-bg); padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        input, select, button { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #333; color: white; font-size: 1rem; }
        button { background-color: var(--accent); border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: var(--secondary); }
        
        /* Grid de Resultados */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 8px; border-left: 5px solid var(--accent); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h3 { margin-top: 0; color: #fff; }
        .stat-row { display: flex; justify-content: space-between; margin: 5px 0; font-size: 0.9rem; border-bottom: 1px solid #444; padding-bottom: 2px; }
        .stat-label { color: #aaa; }
        .stat-value { font-weight: bold; }
        
        /* Calculadora */
        .calculator { background: #252528; padding: 20px; border-radius: 8px; margin-top: 30px; border: 1px solid var(--accent); }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .result-box { margin-top: 20px; padding: 15px; background: #111; border-radius: 5px; text-align: center; font-size: 1.2rem; font-weight: bold; color: #4caf50; }
        .danger { color: #ff5252; }

        @media (max-width: 600px) { .calc-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🐉Base de datos D&D de Nico</h1>
    
    <!-- Buscador y Filtros -->
    <div class="controls">
        <input type="text" id="searchInput" placeholder="Buscar (ej: Orco, Mago)..." onkeyup="filtrarDatos()">
        <select id="tipoSelect" onchange="filtrarDatos()">
            <option value="todos">Todos</option>
            <option value="personajes">Personajes (PCs)</option>
            <option value="monstruos">Monstruos / NPCs</option>
        </select>
        <select id="nivelSelect" onchange="filtrarDatos()">
            <option value="0">Cualquier Nivel</option>
            <option value="1">Nivel > 1</option>
            <option value="5">Nivel > 5</option>
            <option value="5">Nivel > 10</option>
            <option value="5">Nivel > 15</option>
        </select>
    </div>

    <!-- Resultados -->
    <div id="resultados" class="grid"></div>

    <!-- Calculadora de Combate -->
    <div class="calculator">
        <h2>⚔️ Calculadora de Combate Rápido</h2>
        <div class="calc-grid">
            <div>
                <label>Atacante:</label>
                <select id="atacanteSelect" onchange="actualizarCalculadora()"></select>
            </div>
            <div>
                <label>Defensor (CA):</label>
                <input type="number" id="defensorCA" placeholder="Clase de Armadura" value="15">
            </div>
        </div>
        <div class="result-box" id="resultadoCombate">
            Selecciona un atacante para ver probabilidades
        </div>
    </div>
</div>

<script>
    // --- 1. BASE DE DATOS (EDITA ESTO PARA AGREGAR TUS DATOS) ---
    const baseDatos = {
        personajes: [
            { nombre: "Monzze", clase: "Cazador", raza: "semibestia", nivel: 2, ca: 13, pv: 18, fuerza: 14, ataqueBonus: "+2", daño: "1d8" },
            { nombre: "Loveta", clase: "Cazador", raza: "semibestia", nivel: 2, ca: 13, pv: 18, fuerza: 14, ataqueBonus: "+2", daño: "1d8" },
            { nombre: "Kayreli", clase: "Paladin", raza: "Elfo", nivel: 2, ca: 13, pv: 18, fuerza: 14, ataqueBonus: "+2", daño: "1d8" },
            { nombre: "Aurora", clase: "Picaro", raza: "Aaracogra", nivel: 2, ca: 13, pv: 18, fuerza: 14, ataqueBonus: "+2", daño: "1d8" },
        ],
        monstruos: [
            { nombre: "Goblin", nivel: 0, ca: 15, pv: 7, ataqueBonus: "+4", daño: "1d6+2" },
            { nombre: "Ogro", nivel: 2, ca: 15, pv: 59, ataqueBonus: "+5", daño: "2d6+5" },
            { nombre: "Dragón Joven", nivel: 7, ca: 18, pv: 142, ataqueBonus: "+9", daño: "2d10+6" },
            { nombre: "Esqueleto", nivel: 0, ca: 13, pv: 13, ataqueBonus: "+4", daño: "1d6+1" }
        ]
    };

    // --- 2. LÓGICA DE LA APLICACIÓN ---
    
    function init() {
        actualizarCalculadora();
        filtrarDatos();
    }

    function obtenerTextoDado(dadoStr) {
        // Parsea "1d8+4" a un objeto {dados: 1, caras: 8, bonus: 4}
        const regex = /(\d+)d(\d+)([+-]\d+)?/;
        const match = dadoStr.match(regex);
        if (!match) return { promedio: 0 };
        
        const cantidad = parseInt(match);
        const caras = parseInt(match);
        const bonus = parseInt(match) || 0;
        
        // Promedio = (cantidad * (caras+1)/2) + bonus
        const promedio = (cantidad * (caras + 1) / 2) + bonus;
        return { promedio: Math.round(promedio * 10) / 10 };
    }

    function filtrarDatos() {
        const texto = document.getElementById('searchInput').value.toLowerCase();
        const tipo = document.getElementById('tipoSelect').value;
        const nivelFiltro = parseInt(document.getElementById('nivelSelect').value);
        
        const contenedor = document.getElementById('resultados');
        contenedor.innerHTML = '';

        let items = [];
        if (tipo === 'todos') {
            items = [...baseDatos.personajes.map(p => ({...p, tipo: 'PC'})), ...baseDatos.monstruos.map(m => ({...m, tipo: 'Monstruo'}))];
        } else if (tipo === 'personajes') {
            items = baseDatos.personajes.map(p => ({...p, tipo: 'PC'}));
        } else {
            items = baseDatos.monstruos.map(m => ({...m, tipo: 'Monstruo'}));
        }

        const filtrados = items.filter(item => {
            const coincideTexto = item.nombre.toLowerCase().includes(texto) || 
                                  (item.clase && item.clase.toLowerCase().includes(texto));
            const coincideNivel = nivelFiltro === 0 || (item.nivel || 0) > nivelFiltro;
            return coincideTexto && coincideNivel;
        });

        filtrados.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            const tipoLabel = item.tipo === 'PC' ? '🧙‍♂️ Personaje' : '👹 Monstruo';
            
            let statsHtml = `
                <div class="stat-row"><span class="stat-label">Tipo:</span> <span class="stat-value">${tipoLabel}</span></div>
                <div class="stat-row"><span class="stat-label">Nivel/CR:</span> <span class="stat-value">${item.nivel}</span></div>
                <div class="stat-row"><span class="stat-label">Clase de Armadura:</span> <span class="stat-value">${item.ca}</span></div>
                <div class="stat-row"><span class="stat-label">Puntos de Vida:</span> <span class="stat-value">${item.pv}</span></div>
                <div class="stat-row"><span class="stat-label">Bonus Ataque:</span> <span class="stat-value">${item.ataqueBonus}</span></div>
                <div class="stat-row"><span class="stat-label">Daño Promedio:</span> <span class="stat-value">${obtenerTextoDado(item.daño).promedio}</span></div>
            `;
            
            if (item.clase) statsHtml += `<div class="stat-row"><span class="stat-label">Clase:</span> <span class="stat-value">${item.clase}</span></div>`;
            
            card.innerHTML = `<h3>${item.nombre}</h3>${statsHtml}`;
            contenedor.appendChild(card);
        });
    }

    function actualizarCalculadora() {
        const atacanteSelect = document.getElementById('atacanteSelect');
        const resultadoBox = document.getElementById('resultadoCombate');
        const caDefensor = parseInt(document.getElementById('defensorCA').value) || 10;

        // Llenar select con todos los personajes y monstruos
        let opciones = '<option value="">-- Seleccionar Atacante --</option>';
        
        baseDatos.personajes.forEach(p => {
            opciones += `<option value="PC|${p.nombre}|${p.ataqueBonus}|${p.daño}">${p.nombre} (PC)</option>`;
        });
        baseDatos.monstruos.forEach(m => {
            opciones += `<option value="M|${m.nombre}|${m.ataqueBonus}|${m.daño}">${m.nombre} (Monstruo)</option>`;
        });
        atacanteSelect.innerHTML = opciones;

        atacanteSelect.onchange = function() {
            const val = this.value;
            if (!val) {
                resultadoBox.innerHTML = "Selecciona un atacante";
                resultadoBox.className = "result-box";
                return;
            }

            const parts = val.split('|');
            const bonusAtaque = parseInt(parts); // Ej: "+5" -> 5
            const dadoDaño = parts;
            
            // Calcular probabilidad de acierto
            // Necesita d20 + bonus >= CA
            // d20 >= CA - bonus
            const minimoDado = caDefensor - bonusAtaque;
            let probabilidad = 0;
            let mensaje = "";

            if (minimoDado <= 1) {
                probabilidad = 100;
                mensaje = "¡IMPACTO AUTOMÁTICO (siempre acierta)!";
            } else if (minimoDado > 20) {
                probabilidad = 0; // Solo acierta con nat 20, pero simplificamos a 0 para el cálculo base
                mensaje = "¡IMPACTO IMPOSIBLE (salvo Nat 20)!";
            } else {
                // Si minimo es 15, acierta con 15,16,17,18,19,20 (6 caras) -> 6/20 = 30%
                probabilidad = ((21 - minimoDado) / 20) * 100;
                mensaje = `Probabilidad de acierto: ${probabilidad.toFixed(1)}%`;
            }

            // Calcular daño promedio
            const dañoProm = obtenerTextoDado(dadoDaño).promedio;

            let html = `<div>${mensaje}</div>`;
            html += `<div style="font-size: 0.9rem; margin-top:10px;">Bonus Ataque: ${bonusAtaque} vs CA ${caDefensor}</div>`;
            html += `<div style="font-size: 0.9rem;">Daño Promedio: ~${dañoProm} puntos</div>`;
            
            resultadoBox.innerHTML = html;
            resultadoBox.className = "result-box " + (probabilidad > 50 ? "" : "danger");
        };
