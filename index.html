<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor D&D de Nico</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1d; color: #fff; padding: 20px; }
        h1 { color: #c3073f; text-align: center; }
        .controls { background: #2d2d30; padding: 15px; margin-bottom: 20px; border-radius: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
        input, select, button { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #333; color: #fff; }
        button { background: #c3073f; border: none; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
        .card { background: #2d2d30; padding: 15px; border-radius: 8px; border-left: 4px solid #c3073f; }
        .stat { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 4px 0; font-size: 0.9rem; }
        .calc { background: #252528; padding: 20px; margin-top: 20px; border-radius: 8px; }
        .result { margin-top: 15px; padding: 10px; background: #111; text-align: center; font-weight: bold; color: #4caf50; }
    </style>
</head>
<body>
<div class="container">
    <h1>🐉 Base de datos de Nico</h1>
    <div class="controls">
        <input type="text" id="search" placeholder="Buscar..." onkeyup="render()">
        <select id="type" onchange="render()">
            <option value="all">Todos</option>
            <option value="pc">Personajes</option>
            <option value="mob">Monstruos</option>
        </select>
    </div>
    <div id="grid" class="grid"></div>
    
    <div class="calc">
        <h2>⚔️ Combate</h2>
        <select id="attacker" onchange="calc()"></select>
        <input type="number" id="ac" value="15" placeholder="CA" onchange="calc()" style="width: 60px; margin-left: 10px;">
        <div id="res" class="result">Selecciona atacante</div>
    </div>
</div>

<script>
    // --- 1. DATOS (EDITA AQUÍ) ---
    // IMPORTANTE: No olvides la coma (,) al final de cada objeto, excepto el último.
    const db = {
        pc: [
            { n: "Monzze", l: "Cazador", lv: 2, ca: 3, pv: 18, atk: +2, dmg: "1d8" },
            { n: "Lobeta", l: "Cazador", lv: 1, ca: 12, pv: 9, atk: +2, dmg: "1d6" },
            { n: "Keylira", l: "Paladin", lv: 1, ca: 5, pv: 11, atk: +2, dmg: "1d8" },
            { n: "Aurora", l: "Picaro", lv: 1, ca: 3, pv: 11, atk: +1, dmg: "1d6" }
        ],
        mob: [
            { n: "Lobo", lv: 1, ca: 15, pv: 11, xp: 60, dmg: "1d6+4" },
            { n: "Oso Negro", lv: 1, ca: 15, pv: 19, atk: 6, dmg: "1d8+6" },
            { n: "Araña Gigante", lv: 1, ca: 15, pv: 11, atk: 3, dmg: "1d4+3" },
            { n: "Serpiente Gigante", lv: 1, ca: 15, pv: 14, atk: 4, dmg: "1d6+4" },
            { n: "Goblin", lv: 1, ca: 15, pv: 7, atk: 4, dmg: "1d6+2" },
            { n: "Ogro", lv: 2, ca: 15, pv: 59, atk: 5, dmg: "2d6+5" }
        ]
    };

    // --- 2. LÓGICA ---
    function avg(d) {
        const m = d.match(/(\d+)d(\d+)([+-]\d+)?/);
        if(!m) return 0;
        return (parseInt(m) * (parseInt(m)+1)/2) + (parseInt(m)||0);
    }

    function render() {
        const txt = document.getElementById('search').value.toLowerCase();
        const type = document.getElementById('type').value;
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        
        let list = [];
        if(type === 'all' || type === 'pc') list = list.concat(db.pc.map(i => ({...i, t: 'PC'})));
        if(type === 'all' || type === 'mob') list = list.concat(db.mob.map(i => ({...i, t: 'Mob'})));
        
        const filtered = list.filter(i => i.n.toLowerCase().includes(txt) || (i.l && i.l.toLowerCase().includes(txt)));
        
        if(filtered.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#888;">No encontrado</div>';
            return;
        }

        filtered.forEach(i => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3 style="margin:0 0 10px 0;">${i.n} <small style="color:#aaa">(${i.t})</small></h3>
                <div class="stat"><span>Nivel:</span> <span>${i.lv}</span></div>
                <div class="stat"><span>CA:</span> <span>${i.ca}</span></div>
                <div class="stat"><span>PV:</span> <span>${i.pv}</span></div>
                <div class="stat"><span>Atq:</span> <span>+${i.atk}</span></div>
                <div class="stat"><span>Daño:</span> <span>${avg(i.dmg)}</span></div>
            `;
            grid.appendChild(card);
        });
        
        // Actualizar selector de combate
        const sel = document.getElementById('attacker');
        sel.innerHTML = '<option value="">-- Elige --</option>';
        list.forEach(i => {
            sel.innerHTML += `<option value="${i.atk}|${i.dmg}">${i.n} (+${i.atk})</option>`;
        });
    }

    function calc() {
        const val = document.getElementById('attacker').value;
        const ac = parseInt(document.getElementById('ac').value) || 10;
        const out = document.getElementById('res');
        
        if(!val) { out.innerText = "Selecciona atacante"; out.style.color = "#4caf50"; return; }
        
        const [atk, dmg] = val.split('|');
        const min = ac - parseInt(atk);
        let prob = 0, msg = "";
        
        if(min <= 1) { prob = 100; msg = "¡Impacto Automático!"; }
        else if(min > 20) { prob = 5; msg = "Solo Nat 20 (5%)"; }
        else { prob = ((21-min)/20)*100; msg = `${prob.toFixed(1)}% de acierto`; }
        
        out.innerHTML = `${msg}<br><small>Daño: ~${avg(dmg)}</small>`;
        out.style.color = prob > 50 ? "#4caf50" : "#ff5252";
    }

    // Iniciar
    window.onload = () => {
        try {
            render();
            calc();
            console.log("Carga exitosa");
        } catch (e) {
            document.body.innerHTML = `<h1 style="color:red">ERROR: ${e.message}</h1><p>Revisa el código.</p>`;
            console.error(e);
        }
    };
</script>
</body>
</html>
