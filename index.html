<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor D&D de Nico</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1d; color: #fff; padding: 20px; }
        h1 { color: #c3073f; text-align: center; }
        .controls { background: #2d2d30; padding: 15px; margin-bottom: 20px; border-radius: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
        input, select, button { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #333; color: #fff; }
        button { background: #c3073f; border: none; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
        .card { background: #2d2d30; padding: 15px; border-radius: 8px; border-left: 4px solid #c3073f; }
        .stat { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 4px 0; font-size: 0.9rem; }
        .calc { background: #252528; padding: 20px; margin-top: 20px; border-radius: 8px; }
        .result { margin-top: 15px; padding: 10px; background: #111; text-align: center; font-weight: bold; color: #4caf50; }
    </style>
</head>
<body>
<div class="container">
    <h1>🐉 Base de datos de Nico</h1>
    <div class="controls">
        <input type="text" id="search" placeholder="Buscar..." onkeyup="render()">
        <select id="type" onchange="render()">
            <option value="all">Todos</option>
            <option value="pc">Personajes</option>
            <option value="mob">Monstruos</option>
        </select>
    </div>
    <div id="grid" class="grid"></div>
    
    <div class="calc">
        <h2>⚔️ Combate</h2>
        <select id="attacker" onchange="calc()"></select>
        <input type="number" id="ac" value="15" placeholder="CA" onchange="calc()" style="width: 60px; margin-left: 10px;">
        <div id="res" class="result">Selecciona atacante</div>
    </div>
</div>

<script>
    // --- 1. CONFIGURACIÓN ---
    // ¡IMPORTANTE! Reemplaza con tu URL DE LA HOJA NUEVA
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbz1sHw2He1X4J9icKRE1k3O1KfKE8uwbbS7zEptNPsq9kWIy1Nac1UkJnhQMNKkOQPqAw/exec"; 
    
    let data = { pc: [], mob: [] };
    let isLoading = true;

    // --- 2. CARGAR Y LIMPIAR DATOS ---
    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            if (!response.ok) throw new Error("Error al conectar con Google Sheets");
            
            let rawData = await response.json();
            
            console.log("DEBUG: Datos crudos recibidos:", rawData);

            // --- SANITIZACIÓN: Asegurar que rawData es un Array ---
            // A veces Google devuelve un objeto o algo raro. Esto lo fuerza a array.
            if (!Array.isArray(rawData)) {
                console.warn("El formato de datos no es un Array. Intentando convertir...");
                // Si es un objeto, intentamos extraer sus valores
                if (typeof rawData === 'object') {
                    rawData = Object.values(rawData);
                } else {
                    rawData = [];
                }
            }

            // --- FILTRADO Y LIMPIEZA DE COLUMNA ---
            // Aseguramos que cada fila sea un objeto con claves correctas
            const cleanData = rawData.map(row => {
                // Si la fila es un string (error común), lo ignoramos
                if (typeof row === 'string') return null;
                
                // Si la fila es un objeto, aseguramos que tenga las propiedades
                // Si las claves vienen con espacios o tildes, las normalizamos
                const cleanRow = {};
                Object.keys(row).forEach(key => {
                    const cleanKey = String(key).toLowerCase().trim().replace(/\s+/g, '');
                    cleanRow[cleanKey] = row[key];
                });
                return cleanRow;
            }).filter(r => r !== null);

            console.log("DEBUG: Datos limpiados:", cleanData);

            // Separar en PC y Mob
            data.pc = cleanData.filter(item => (item.tipo && item.tipo.toLowerCase() === 'pc'));
            data.mob = cleanData.filter(item => (item.tipo && item.tipo.toLowerCase() === 'mob'));

            console.log("PCs encontrados:", data.pc.length);
            console.log("Mob encontrados:", data.mob.length);

            isLoading = false;
            render();
            calc();
        } catch (error) {
            console.error("Error cargando datos:", error);
            document.body.innerHTML = `<h1 style="color:red; text-align:center; margin-top:50px;">Error al cargar datos.<br>${error.message}</h1>`;
        }
    }

    // --- 3. LÓGICA DE VISTA (Render) ---
    function avg(d) {
        if (!d) return 0;
        const m = d.toString().match(/(\d+)d(\d+)([+-]\d+)?/);
        if(!m) return 0;
        return (parseInt(m) * (parseInt(m)+1)/2) + (parseInt(m)||0);
    }

    function render() {
        if (isLoading) return;
        const txt = document.getElementById('search').value.toLowerCase();
        const type = document.getElementById('type').value;
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        
        let list = [];
        if(type === 'all' || type === 'pc') list = list.concat(data.pc.map(i => ({...i, t: 'PC'})));
        if(type === 'all' || type === 'mob') list = list.concat(data.mob.map(i => ({...i, t: 'Mob'})));
        
        const filtered = list.filter(i => 
            (i.nombre && i.nombre.toLowerCase().includes(txt)) || 
            (i.clase && i.clase.toLowerCase().includes(txt))
        );
        
        if(filtered.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#888;">No encontrado o datos vacíos. Revisa la consola (F12).</div>';
            return;
        }

        filtered.forEach(i => {
            const card = document.createElement('div');
            const uniqueId = i.id || Math.random().toString(36).substr(2, 9);
            
            card.className = `card ${i.t === 'PC' ? 'pc' : 'mob'}`;
            
            let xpHtml = i.t === 'Mob' ? `<div class="xp-badge">XP: ${i.xp || 0}</div>` : '';
            let oroHtml = i.t === 'PC' ? `<div class="stat-row"><span class="stat-label">Oro:</span> <span class="stat-value gold-text">${i.oro || 0}</span></div>` : '';
            
            let invHtml = '';
            if(i.t === 'PC' && i.inventario && Array.isArray(i.inventario) && i.inventario.length > 0) {
                invHtml = `<div class="inv-list">
                    <div style="font-weight:bold; margin-bottom:3px;">🎒 Inventario:</div>
                    ${i.inventario.map(item => `<div class="inv-item"><span>${item}</span></div>`).join('')}
                </div>`;
            } else if (i.t === 'PC' && typeof i.inventario === 'string') {
                 // Fallback si viene como string
                 const items = i.inventario.split(',').map(s=>s.trim());
                 invHtml = `<div class="inv-list">
                    <div style="font-weight:bold; margin-bottom:3px;">🎒 Inventario:</div>
                    ${items.map(item => `<div class="inv-item"><span>${item}</span></div>`).join('')}
                </div>`;
            }

            card.innerHTML = `
                <h3>${i.nombre || 'Sin Nombre'} ${xpHtml}</h3>
                <div class="stat-row"><span>Nivel:</span> <span>${i.nivel || 0}</span></div>
                <div class="stat-row"><span>CA:</span> <span>${i.ca || 10}</span></div>
                <div class="stat-row"><span>PV:</span> <span class="${(i.pv || 0) < ((i.maxpv || 0)/2) ? 'danger' : ''}">${i.pv || 0} / ${i.maxpv || 0}</span></div>
                ${oroHtml}
                <div class="stat-row"><span>Atq:</span> <span>+${i.atk || 0}</span></div>
                <div class="stat-row"><span>Daño:</span> <span>${avg(i.dmg)}</span></div>
                ${invHtml}
                
                ${i.t === 'PC' ? `
                <button class="secondary" style="width:100%; margin-top:10px;" onclick="alert('Para editar, ve a tu Google Sheets y cambia los valores. Los cambios se reflejarán al recargar la página.')">✏️ Editar (Ir a Google Sheets)</button>
                ` : ''}
            `;
            grid.appendChild(card);
        });
        
        // Actualizar calculadora
        const sel = document.getElementById('attacker');
        sel.innerHTML = '<option value="">-- Elige --</option>';
        list.forEach(i => {
            sel.innerHTML += `<option value="${i.atk || 0}|${i.dmg || '1d6'}">${i.nombre || 'Desconocido'} (+${i.atk || 0})</option>`;
        });
    }

    // --- 4. CALCULADORA ---
    function calc() {
        const val = document.getElementById('attacker').value;
        const ac = parseInt(document.getElementById('ac').value) || 10;
        const out = document.getElementById('res');
        
        if(!val) { out.innerText = "Selecciona atacante"; out.style.color = "#4caf50"; return; }
        
        const [atk, dmg] = val.split('|');
        const min = ac - parseInt(atk);
        let prob = 0, msg = "";
        
        if(min <= 1) { prob = 100; msg = "¡Impacto Automático!"; }
        else if(min > 20) { prob = 5; msg = "Solo Nat 20 (5%)"; }
        else { prob = ((21-min)/20)*100; msg = `${prob.toFixed(1)}% de acierto`; }
        
        out.innerHTML = `${msg}<br><small>Daño: ~${avg(dmg)}</small>`;
        out.style.color = prob > 50 ? "#4caf50" : "#ff5252";
    }

    // --- 5. INICIO ---
    window.onload = loadData;
            </script>
</body>
</html>
